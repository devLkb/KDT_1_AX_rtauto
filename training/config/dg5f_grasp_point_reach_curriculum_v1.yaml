# V1 arm-policy transfer followed by progressively stricter point reaching.
behaviors:
  DG5FGraspPointReach:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.00005
      beta: 0.003
      epsilon: 0.15
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 15
    checkpoint_interval: 100000
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 10000
    threaded: false

torch_settings:
  device: cuda

environment_parameters:
  reach_stage:
    curriculum:
      - name: legacy_5cm_instant
        completion_criteria:
          measure: reward
          behavior: DG5FGraspPointReach
          threshold: 2.0
          min_lesson_length: 200
          signal_smoothing: false
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 1.0
      - name: wide_3cm_slow_hold
        completion_criteria:
          measure: reward
          behavior: DG5FGraspPointReach
          threshold: 2.5
          min_lesson_length: 200
          signal_smoothing: false
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 2.0
      - name: precise_1cm_stable_hold
        value:
          sampler_type: constant
          sampler_parameters:
            value: 3.0

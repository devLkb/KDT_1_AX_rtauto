# DG5F GraspPoint reach task v1.0.0.
#
# Packaged Linux player contract (verified through the ML-Agents handshake):
#   behavior: DG5FGraspPointReach
#   vector observations: 26
#   continuous actions: 6
#   parallel agents per player: 20
behaviors:
  DG5FGraspPointReach:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 2000000
    time_horizon: 128
    # One player contains 20 agents. This produces a useful progress update
    # every 100 synchronized policy decisions while keeping event files small.
    summary_freq: 2000
    # CUDA's default-device mode is thread-local in the verified ax310 venv.
    threaded: false

torch_settings:
  device: cuda

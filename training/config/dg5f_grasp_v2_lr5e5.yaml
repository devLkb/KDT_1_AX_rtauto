# Frozen configuration of the failed dg5f_v2_joint26_lr5e5_gpu_fixed run.
# Do not use this file for the standard V2 restart; use the hand-first config.
behaviors:
  DG5FGraspJoint:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.00005
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 200
    threaded: false

torch_settings:
  device: cuda

environment_parameters:
  joint26_stage:
    curriculum:
      - name: near_ball_pregrasp
        completion_criteria:
          measure: progress
          behavior: DG5FGraspJoint
          threshold: 0.15
          min_lesson_length: 100
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 1.0
      - name: v1_spawn_pregrasp
        completion_criteria:
          measure: progress
          behavior: DG5FGraspJoint
          threshold: 0.45
          min_lesson_length: 100
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 2.0
      - name: full_open_independent_joints
        value:
          sampler_type: constant
          sampler_parameters:
            value: 3.0

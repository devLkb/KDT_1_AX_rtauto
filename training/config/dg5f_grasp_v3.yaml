# DG5F Stable Whole-Hand Grasp 3.0.0.
# The policy shape is unchanged from V2, so V2's 116x26 checkpoint is used as
# the initialization source. The Unity package changes the behavior and
# curriculum parameter names; both names must stay in sync with its manifest.
behaviors:
  DG5FStableGrasp:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.00005
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 20000
    threaded: false

torch_settings:
  device: cuda

environment_parameters:
  stable_grasp_stage:
    curriculum:
      - name: acquire_stable_whole_hand_contact
        completion_criteria:
          measure: reward
          behavior: DG5FStableGrasp
          threshold: 3.5
          min_lesson_length: 200
          signal_smoothing: false
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 1.0
      - name: lift_2cm_and_hold_0_5s
        completion_criteria:
          measure: reward
          behavior: DG5FStableGrasp
          threshold: 5.0
          min_lesson_length: 200
          signal_smoothing: false
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 2.0
      - name: lift_5cm_and_hold_1s
        value:
          sampler_type: constant
          sampler_parameters:
            value: 3.0

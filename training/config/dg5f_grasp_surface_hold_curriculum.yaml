behaviors:
  DG5FGrasp:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.00005
      beta: 0.00001
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 1000
    threaded: false

torch_settings:
  device: cuda

environment_parameters:
  hold_stage:
    curriculum:
      - name: hold_025s_tolerance_3cm
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          threshold: 1.0
          min_lesson_length: 500
          signal_smoothing: true
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 1.0
      - name: hold_050s_tolerance_25mm
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          threshold: 1.0
          min_lesson_length: 500
          signal_smoothing: true
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 2.0
      - name: hold_1s_tolerance_2cm
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          threshold: 1.0
          min_lesson_length: 500
          signal_smoothing: true
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 3.0
      - name: hold_2s_tolerance_15mm
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          threshold: 1.0
          min_lesson_length: 500
          signal_smoothing: true
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 4.0
      - name: hold_3s_tolerance_1cm
        value:
          sampler_type: constant
          sampler_parameters:
            value: 5.0

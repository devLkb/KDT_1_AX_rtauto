behaviors:
  DG5FStableGrasp:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0001
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 200
    # Required by the ax310 PyTorch build; see training/README.md.
    threaded: false

torch_settings:
  device: cuda

environment_parameters:
  stable_grasp_stage:
    curriculum:
      - name: near_ball_pregrasp_stable_contact
        completion_criteria:
          measure: progress
          behavior: DG5FStableGrasp
          threshold: 0.35
          min_lesson_length: 200
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 1.0
      - name: full_spawn_pregrasp_lift_two_centimeters
        completion_criteria:
          measure: progress
          behavior: DG5FStableGrasp
          threshold: 0.55
          min_lesson_length: 300
          require_reset: true
        value:
          sampler_type: constant
          sampler_parameters:
            value: 2.0
      - name: full_spawn_open_hand_final_stable_grasp
        value:
          sampler_type: constant
          sampler_parameters:
            value: 3.0

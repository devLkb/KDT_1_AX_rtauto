behaviors:
  DG5FGraspV4:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 1000
    threaded: true

# Promotion is intentionally external: stock ML-Agents cannot gate on the
# custom Grasp/Success statistic. Keep this constant until the promotion script
# accepts >=200 evaluation episodes with >=80% success, then train with the
# emitted next-stage config. This prevents shaped reward from advancing early.
environment_parameters:
  lesson:
    sampler_type: constant
    sampler_parameters:
      value: 0.0

torch_settings:
  device: cpu

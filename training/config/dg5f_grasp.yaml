behaviors:
  DG5FGrasp:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000
    threaded: true

environment_parameters:
  lesson:
    curriculum:
      - name: Reach
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.8
        value: 0.0
      - name: Grasp
        completion_criteria:
          measure: reward
          behavior: DG5FGrasp
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.8
        value: 1.0
      - name: LiftAndHold
        value: 2.0

torch_settings:
  device: cpu

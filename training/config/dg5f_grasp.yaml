behaviors:
  DG5FGrasp:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 5000000
    time_horizon: 128
    # 20 agents advance together; print progress frequently enough that a
    # CPU-heavy Unity collection phase does not look stalled.
    summary_freq: 200
    # torch.set_default_device() is thread-local in the ax310 PyTorch build.
    # ML-Agents' background update thread otherwise creates CPU trajectory
    # tensors while the policy/critic parameters are on CUDA.
    threaded: false

torch_settings:
  device: cuda
